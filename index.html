<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Asia Bulk Sacks Inquiry Processing POC</title>
    <link rel="stylesheet" href="styles.css?v=1.1">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <!-- Header Section -->
            <div class="header-container">
                <div class="logo-wrapper" style="width: auto; height: 64px; background: none; box-shadow: none; padding: 0; margin-bottom: 12px;">
                    <!-- Custom Corporate SVG Logo -->
                    <svg class="header-logo" viewBox="0 0 350 80" xmlns="http://www.w3.org/2000/svg" style="width: 260px; height: auto;">
                        <g transform="translate(10, 3)">
                            <!-- 1. Back-left inner face (Red) -->
                            <polygon points="5,25 35,10 35,42 5,57" fill="#e21a22" />
                            <!-- 2. Back-right inner face (Dark Grey) -->
                            <polygon points="35,10 65,25 65,57 35,42" fill="#231f20" />
                            <!-- 3. Left outer face (Dark Grey) -->
                            <polygon points="5,25 35,42 35,74 5,57" fill="#231f20" />
                            <!-- 4. Front right outer face (Red) -->
                            <polygon points="35,42 65,25 65,57 35,74" fill="#e21a22" />
                            
                            <!-- White separation lines/strokes to match image -->
                            <line x1="35" y1="42" x2="35" y2="74" stroke="#ffffff" stroke-width="1.8" />
                            <line x1="5" y1="25" x2="35" y2="42" stroke="#ffffff" stroke-width="1.8" />
                            <line x1="35" y1="42" x2="65" y2="25" stroke="#ffffff" stroke-width="1.8" />
                            <line x1="35" y1="10" x2="35" y2="42" stroke="#ffffff" stroke-width="1.8" />
                            
                            <!-- White Letter 'a' on Front-Right Red Face -->
                            <text x="49" y="59" fill="#ffffff" font-family="'Plus Jakarta Sans', sans-serif" font-weight="700" font-size="28" text-anchor="middle">a</text>
                        </g>
                        
                        <!-- Text Logo next to cube -->
                        <text x="90" y="44" fill="#231f20" font-family="'Plus Jakarta Sans', sans-serif" font-weight="800" font-size="30" letter-spacing="-0.03em">Asia Bulk Sacks</text>
                        <text x="264" y="62" fill="#231f20" font-family="'Plus Jakarta Sans', sans-serif" font-weight="700" font-size="16" letter-spacing="-0.01em">Pvt Ltd</text>
                    </svg>
                </div>
                <p class="subtitle" style="font-weight: 600; color: var(--text-secondary); margin-top: 4px;">Inquiry Processing POC</p>
            </div>

            <!-- Login Form -->
            <form id="loginForm" novalidate>
                <!-- Username Input Group -->
                <div class="form-group" id="usernameGroup">
                    <label for="username" class="input-label">Username</label>
                    <div class="input-wrapper">
                        <!-- Envelope / Mail SVG Icon -->
                        <svg class="input-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
                        </svg>
                        <input type="email" id="username" class="form-input" placeholder="demo@abs.com" autocomplete="username" required>
                    </div>
                    <div class="error-msg" id="usernameError">Please enter a valid email address (e.g. name@domain.com)</div>
                </div>

                <!-- Password Input Group -->
                <div class="form-group" id="passwordGroup">
                    <label for="password" class="input-label">Password</label>
                    <div class="input-wrapper">
                        <!-- Lock SVG Icon -->
                        <svg class="input-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
                        </svg>
                        <input type="password" id="password" class="form-input" placeholder="••••••••" autocomplete="current-password" required>
                    </div>
                    <div class="error-msg" id="passwordError">Password must be at least 6 characters</div>
                </div>

                <!-- Login Button -->
                <button type="submit" class="login-btn">Log In</button>
            </form>

            <!-- Demo Credentials Box -->
            <div class="credentials-box">
                <div class="credentials-header">
                    <!-- Key SVG Icon -->
                    <svg class="credentials-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12.65 10C11.83 7.67 9.61 6 7 6c-3.31 0-6 2.69-6 6s2.69 6 6 6c2.61 0 4.83-1.67 5.65-4H17v4h4v-4h2v-4H12.65zM7 14c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2z"/>
                    </svg>
                    <span>Demo Credentials</span>
                </div>
                <div class="credentials-body">
                    <div class="credential-row">
                        <span class="credential-label">Username:</span>
                        <span class="credential-value" id="demoUsernameVal">demo@abs.com</span>
                    </div>
                    <div class="credential-row">
                        <span class="credential-label">Password:</span>
                        <span class="credential-value" id="demoPasswordVal">Demo@123</span>
                    </div>
                </div>
                <button type="button" class="autofill-btn" id="autofillBtn">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                        <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-2 10H7v-2h10v2z"/>
                    </svg>
                    Autofill & Log In
                </button>
            </div>
        </div>

        <!-- Page Footer matching design -->
        <footer class="page-footer" style="margin-top: 40px;">
            <div class="page-footer-left">
                &copy; 2026 ABS Inquiry POC. All Rights Reserved.
            </div>
            <div class="page-footer-right">
                Designed and Developed by <a href="https://www.hiddenbrains.com" target="_blank">Hidden Brains</a>
            </div>
        </footer>
    </div>

    <!-- Script File -->
    <script src="login.js"></script>
</body>
</html>
